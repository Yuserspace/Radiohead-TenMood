        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
        
        body {

            color: #e4e4e7; 
            padding: 2rem 1.5rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        header { text-align: center; margin-bottom: 2rem; max-width: 700px; margin-top: 2rem; }
        header h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -0.05em; color: #ffffff; margin-bottom: 0.5rem; text-shadow: 0 0 25px rgba(255,255,255,0.1); }
        
        .filter-section { width: 100%; max-width: 1000px; margin-bottom: 2rem; display: flex; flex-direction: column; gap: 1rem; align-items: center; }
        .filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
        .filter-btn { background-color: rgba(26, 26, 31, 0.8); border: 1px solid #2d2d36; color: #a1a1aa; padding: 0.4rem 0.8rem; border-radius: 20px; cursor: pointer; font-size: 0.8rem; transition: all 0.3s ease; }
        .filter-btn:hover { background-color: #2d2d36; color: #ffffff; }
        .filter-btn.active { background-color: #e4e4e7; color: #0c0c0e; border-color: #e4e4e7; font-weight: 700; }
        
        .song-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1200px; margin-bottom: 4rem; }
        
        .song-card { background-color: rgba(21, 21, 24, 0.9); border: 1px solid #232329; border-radius: 12px; padding: 1.5rem; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.3s ease, box-shadow 0.3s ease; position: relative; overflow: hidden; }
        .song-card:hover { transform: translateY(-5px); border-color: #3f3f46; box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5); }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.2rem; }
        
        .tags-container { display: flex; gap: 0.4rem; flex-wrap: wrap; max-width: 65%; }
        .tag { font-size: 0.7rem; padding: 0.3rem 0.5rem; border-radius: 6px; font-weight: 600; white-space: nowrap; }
        
        .tag.우울 { background-color: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
        .tag.분노 { background-color: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .tag.불안 { background-color: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .tag.좌절 { background-color: rgba(139, 92, 246, 0.1); color: #a78bfa; border: 1px solid rgba(139, 92, 246, 0.2); }
        .tag.공허 { background-color: rgba(107, 114, 128, 0.1); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.2); }
        .tag.기쁨 { background-color: rgba(16, 185, 129, 0.1); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .tag.반전 { background-color: rgba(236, 72, 153, 0.1); color: #f472b6; border: 1px solid rgba(236, 72, 153, 0.2); }
        .tag.서늘 { background-color: rgba(6, 182, 212, 0.1); color: #22d3ee; border: 1px solid rgba(6, 182, 212, 0.2); }
        .tag.따뜻 { background-color: rgba(250, 204, 21, 0.1); color: #fde047; border: 1px solid rgba(250, 204, 21, 0.2); }
        .tag.신남 { background-color: rgba(132, 204, 22, 0.1); color: #a3e635; border: 1px solid rgba(132, 204, 22, 0.2); }

        .album-info-box { display: flex; flex-direction: column; align-items: flex-end; max-width: 35%; }
        .album-name { font-size: 0.65rem; color: #71717a; font-weight: 700; margin-bottom: 0.4rem; text-align: right; line-height: 1.2; word-break: keep-all; }
        .album-cover { width: 44px; height: 44px; border-radius: 4px; background-color: #27272a; object-fit: cover; border: 1px solid #3f3f46; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        .lyrics-box { margin-bottom: 1.5rem; flex-grow: 1; }
        .lyrics-en { font-family: 'Georgia', serif; font-style: italic; font-size: 1.05rem; color: #f4f4f5; line-height: 1.4; margin-bottom: 0.5rem; word-break: keep-all; }
        .lyrics-kr { font-size: 0.85rem; color: #a1a1aa; line-height: 1.4; word-break: keep-all; }

        .card-footer { display: flex; justify-content: space-between; align-items: flex-end; border-top: 1px solid #27272a; padding-top: 1rem; }
        .song-title { font-size: 1.05rem; color: #ffffff; font-weight: 700; line-height: 1.2; max-width: 60%; word-break: keep-all; }
        
        .music-links { display: flex; gap: 0.5rem; }
        .link-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 50%; background-color: #27272a; transition: all 0.2s; text-decoration: none; cursor: pointer; border: none; }
        .link-btn svg { width: 16px; height: 16px; fill: #a1a1aa; transition: fill 0.2s; }
        .link-btn.apple:hover { background-color: #fa243c; } .link-btn.apple:hover svg { fill: #ffffff; }
        .link-btn.spotify:hover { background-color: #1ed760; } .link-btn.spotify:hover svg { fill: #000000; }
        .link-btn.youtube:hover { background-color: #ff0000; } .link-btn.youtube:hover svg { fill: #ffffff; }

        .count-display { margin-top: 1rem; font-size: 0.9rem; color: #71717a; text-align: center; }
    </style>
</head>

        const radioheadSongs = rawData.map(data => {
            const parts = data.split('|');
            return {
                albumNum: parseInt(parts[0]),
                title: parts[1],
                moods: parts[2].split(','), 
                en: parts[3],
                kr: parts[4],
                youtube: parts[5]
            };
        });

        let selectedMoods = new Set();
        let selectedAlbums = new Set();

        const grid = document.getElementById('songGrid');
        const countDisplay = document.getElementById('countDisplay');

        function showComingSoon(event) {
            event.preventDefault();
            alert("[아직 추가하지 않은 기능입니다. 빠른 시일내 추가하겠습니다]");
        }

        function renderSongs(songsToRender) {
            grid.innerHTML = '';
            countDisplay.innerText = `총 ${songsToRender.length}곡 검색됨`;
            
            songsToRender.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                
                const tagsHtml = song.moods.map(m => `<span class="tag ${m}">#${m}</span>`).join('');
                const albumInfo = albumData[song.albumNum];

                card.innerHTML = `
                    <div class="card-header">
                        <div class="tags-container">${tagsHtml}</div>
                        <div class="album-info-box">
                            <div class="album-name">${song.albumNum}집 : ${albumInfo.name}</div>
                            <img class="album-cover" src="${albumInfo.cover}" alt="${song.albumNum}집" referrerpolicy="no-referrer">
                        </div>
                    </div>
                    <div class="lyrics-box">
                        <p class="lyrics-en">"${song.en}"</p>
                        <p class="lyrics-kr">${song.kr}</p>
                    </div>
                    <div class="card-footer">
                        <h3 class="song-title">${song.title}</h3>
                        <div class="music-links">
                            <button onclick="showComingSoon(event)" class="link-btn apple" title="Apple Music">${iconApple}</button>
                            <button onclick="showComingSoon(event)" class="link-btn spotify" title="Spotify">${iconSpotify}</button>
                            <a href="${song.youtube}" target="_blank" class="link-btn youtube" title="YouTube Music">${iconYoutube}</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleFilter(type, value, btn) {
            if (value === 'all') {
                if (type === 'mood') {
                    selectedMoods.clear();
                    document.querySelectorAll('#moodFilters .filter-btn').forEach(b => b.classList.remove('active'));
                } else {
                    selectedAlbums.clear();
                    document.querySelectorAll('#albumFilters .filter-btn').forEach(b => b.classList.remove('active'));
                }
                btn.classList.add('active');
            } else {
                if (type === 'mood') {
                    document.querySelector('#moodFilters .filter-btn[onclick*="all"]').classList.remove('active');
                    if (selectedMoods.has(value)) {
                        selectedMoods.delete(value);
                        btn.classList.remove('active');
                    } else {
                        selectedMoods.add(value);
                        btn.classList.add('active');
                    }
                    if(selectedMoods.size === 0) document.querySelector('#moodFilters .filter-btn[onclick*="all"]').classList.add('active');
                } else {
                    document.querySelector('#albumFilters .filter-btn[onclick*="all"]').classList.remove('active');
                    if (selectedAlbums.has(value)) {
                        selectedAlbums.delete(value);
                        btn.classList.remove('active');
                    } else {
                        selectedAlbums.add(value);
                        btn.classList.add('active');
                    }
                    if(selectedAlbums.size === 0) document.querySelector('#albumFilters .filter-btn[onclick*="all"]').classList.add('active');
                }
            }
            
            let filtered = radioheadSongs.filter(song => {
                let moodMatch = selectedMoods.size === 0 || song.moods.some(m => selectedMoods.has(m));
                let albumMatch = selectedAlbums.size === 0 || selectedAlbums.has(song.albumNum);
                return moodMatch && albumMatch;
            });
            renderSongs(filtered);
        }

        window.onload = () => renderSongs(radioheadSongs);
    </script>
</body>
</html>
